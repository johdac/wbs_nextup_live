info:
  name: createLocation2
  type: http
  seq: 2

http:
  method: POST
  url: "{{api}}/locations"
  body:
    type: json
    data: |-
      {
        "title": "Madame Claude",
        "geo": {
          "type": "Point",
          "coordinates": [13.4346337, 52.4995184]
        }
      }
  auth: inherit

runtime:
  actions:
    - type: set-variable
      phase: after-response
      selector:
        expression: res.body.id
        method: jsonq
      variable:
        name: createdLocation2
        scope: runtime

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
