info:
  name: createArtist2
  type: http
  seq: 2

http:
  method: POST
  url: "{{api}}/artists"
  body:
    type: json
    data: |-
      {
        "name": "Test Band 1",
        "genres": ["jazz", "electronic"]
      }
  auth: inherit

runtime:
  actions:
    - type: set-variable
      phase: after-response
      selector:
        expression: res.body.id
        method: jsonq
      variable:
        name: createdArtist2
        scope: runtime

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
