info:
  name: createEvent2
  type: http
  seq: 2

http:
  method: POST
  url: "{{api}}/events"
  body:
    type: json
    data: |-
      {
        "location": "{{createdLocation1}}",
        "artists": ["{{createdArtist1}}"],
        "title": "Artist 1 playing at Fitz Roy again",
        "startDate": "2026-05-29T17:20:00.000Z",
        "endDate": "2026-05-29T17:23:00.000Z"
      }
  auth: inherit

runtime:
  actions:
    - type: set-variable
      phase: after-response
      selector:
        expression: res.body.id
        method: jsonq
      variable:
        name: createdEvent2
        scope: runtime

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
